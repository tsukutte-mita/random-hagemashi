<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>配慮おみくじ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 80px;
      background: #fff7fb;
    }
    button {
      font-size: 20px;
      padding: 14px 28px;
      border-radius: 999px;
      border: none;
      background: #ff8ac8;
      color: white;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>配慮おみくじ</h1>
  <button onclick="drawMood()">引く(凶なし)</button>
  <div id="result"></div>

  <script>
    function drawMood() {
      const messages = [
        "大吉",
        "中吉",
        "吉",
        "小吉",
        "末吉"
      ];

      const random = Math.floor(Math.random() * messages.length);
      document.getElementById("result").textContent = messages[random];
    }
  </script>
</body>
</html>
